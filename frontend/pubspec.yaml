name: delivery_partner_app
description: Qikzoo Delivery Partner — frontend
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  get: ^4.6.6
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  pin_code_fields: ^8.0.1
  flutter_svg: ^2.0.10+1
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  equatable: ^2.0.5
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  sms_autofill: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/illustrations/
    - assets/animations/
